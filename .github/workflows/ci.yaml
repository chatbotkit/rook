name: CI

on:
  push:
    branches:
      - main
      - next
    tags-ignore:
      - 'v*'
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  pull_request:
    branches:
      - main
      - next
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'

permissions:
  contents: read

jobs:
  check:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Float to the newest go-sdk. The committed go.mod already pins a working
      # published version, so this only bumps to anything newer on main.
      - name: Update go-sdk to latest
        run: |
          go get github.com/chatbotkit/go-sdk@latest
          go mod tidy

      - name: Vet
        run: go vet ./...

      - name: Vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Test
        run: go test ./... -count=1 -race

      - name: Build
        run: CGO_ENABLED=0 go build -trimpath ./cmd/rook

  cross-compile:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/next'

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Update go-sdk to latest
        run: |
          go get github.com/chatbotkit/go-sdk@latest
          go mod tidy

      - name: Cross-compile
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -trimpath -o "rook${EXT}" ./cmd/rook
