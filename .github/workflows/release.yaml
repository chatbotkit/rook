name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Float to the newest go-sdk before cutting the release. The committed
      # go.mod already pins a working published version; this bumps to latest.
      - name: Update go-sdk to latest
        run: |
          go get github.com/chatbotkit/go-sdk@latest
          go mod tidy

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X github.com/chatbotkit/rook/internal/version.Version=${VERSION}"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi

          OUTDIR="dist/rook-${VERSION}-${GOOS}-${GOARCH}"
          mkdir -p "${OUTDIR}"

          echo "Building rook ${VERSION} for ${GOOS}/${GOARCH}..."
          go build -trimpath -ldflags "${LDFLAGS}" -o "${OUTDIR}/rook${EXT}" ./cmd/rook

          cp README.md LICENSE "${OUTDIR}/"

          tar -czf "dist/rook-${VERSION}-${GOOS}-${GOARCH}.tar.gz" -C dist "rook-${VERSION}-${GOOS}-${GOARCH}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rook-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  publish:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        working-directory: dist
        run: sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
